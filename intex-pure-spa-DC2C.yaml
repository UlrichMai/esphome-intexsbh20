substitutions:
  name: "intex-pure-spa-dc2c"
  friendly_name: "Intex Pure Spa SSP-H20 DC2C"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  #name_add_mac_suffix: true
  project:
    name: UlrichMai.esphome-intex-pure-spa1
    version: "1.0"
  platformio_options:
    board_build.f_cpu: 160000000L

esp8266:
  board: d1_mini

external_components:
#  - source: github://UlrichMai/esphome-intexsbh20
#    components: [intexsbh20]
  - source:
      type: local
      path: components

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

#dashboard_import:
#  package_import_url: github://UlrichMai/esphome-intexsbh20/intex-pure-spa.yaml@main

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    password: !secret wifi_ap_password

captive_portal:

status_led:
  pin:
    number: D4
    inverted: true  

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s 
    entity_category: diagnostic

button:
  - platform: safe_mode
    name: Safe Mode Boot
    entity_category: diagnostic 
  - platform: restart
    name: Restart
    entity_category: diagnostic 
    
climate:

switch:

binary_sensor:

text_sensor:

intexsbh20:
  climate:
    name: Thermostat
    icon: mdi:hot-tub
  power:
    name: Power
    icon: mdi:power
    entity_category: diagnostic    
  filter:
    name: Filter
    icon: mdi:air-filter
    entity_category: diagnostic    
  bubble:
    name: Bubble
    icon: mdi:chart-bubble
  water_temperature:
    name: Water temperature
    icon: mdi:water-thermometer
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 0
    unit_of_measurement: °C
    filters: 
    - clamp:
        min_value: 10
        max_value: 50
        ignore_out_of_range: true

  error_text:
    name: Error
    icon: mdi:alert-circle
    entity_category: diagnostic
